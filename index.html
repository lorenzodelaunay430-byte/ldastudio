<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier H Anguier</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <div class="logo-box">H</div>
        <h2>Atelier H<br><span>Anguier</span></h2>
    </div>

    <div class="menu">
        <button class="active">Accueil</button>
        <button>Scanner</button>
        <button>Toutes les boîtes</button>
    </div>
</div>

<div class="main">
    <h1>Atelier H <span>Anguier</span></h1>
    <p class="subtitle">Gestion des boîtes - Atelier H</p>

    <div class="scanner-card">
        <div>
            <h2>Scanner une boîte</h2>
            <p>Scannez un code : Qboite1Q → Qboite48Q</p>
            <input type="text" id="scanInput" placeholder="Scannez ici..." autofocus>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <h3>48</h3>
            <p>Boîtes</p>
        </div>

        <div class="stat">
            <h3>1</h3>
            <p>Emplacement</p>
        </div>

        <div class="stat">
            <h3 id="indispoCount">0</h3>
            <p>Indisponibles</p>
        </div>
    </div>

    <div id="result"></div>

    <h2 class="section-title">Aperçu des boîtes</h2>
    <div class="boxes" id="boxes"></div>
</div>

<script src="script.js"></script>
</body>
</html>
